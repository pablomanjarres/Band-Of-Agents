<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0f24"/>
      <stop offset="0.55" stop-color="#141a3c"/>
      <stop offset="1" stop-color="#241a4d"/>
    </linearGradient>
    <radialGradient id="coreGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#a855f7" stop-opacity="0.9"/>
      <stop offset="0.6" stop-color="#7c3aed" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="coreFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a2150"/>
      <stop offset="1" stop-color="#181232"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c084fc"/>
      <stop offset="1" stop-color="#60a5fa"/>
    </linearGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#ffffff" opacity="0.05"/>
    </pattern>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#8a93c2"/>
    </marker>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#dots)"/>
  <circle cx="965" cy="300" r="252" fill="none" stroke="#a855f7" stroke-opacity="0.10" stroke-width="1.5"/>
  <circle cx="965" cy="300" r="182" fill="none" stroke="#60a5fa" stroke-opacity="0.08" stroke-width="1.5"/>

  <!-- LEFT: identity -->
  <circle cx="74" cy="136" r="5" fill="#a855f7"/>
  <text x="90" y="141" fill="#8b93c4" font-size="15" font-weight="600" letter-spacing="3">BAND OF AGENTS HACKATHON  ·  2026</text>

  <text x="70" y="226" font-size="64" font-weight="800" fill="#f8fafc">Band Review</text>
  <text x="70" y="298" font-size="64" font-weight="800" fill="url(#accent)">Board</text>

  <text x="72" y="352" font-size="20" fill="#c2c9e8">Specialist agents clear a global campaign against every</text>
  <text x="72" y="382" font-size="20" fill="#c2c9e8">market's advertising and regulatory rules in minutes,</text>
  <text x="72" y="412" font-size="20" fill="#c2c9e8">with a full audit trail.</text>

  <!-- chips -->
  <rect x="72" y="446" width="166" height="34" rx="17" fill="#a855f7" fill-opacity="0.13" stroke="#a855f7" stroke-opacity="0.55"/>
  <text x="155" y="468" text-anchor="middle" fill="#d8b4fe" font-size="15" font-weight="600">Multi-agent pods</text>
  <rect x="250" y="446" width="126" height="34" rx="17" fill="#34d399" fill-opacity="0.12" stroke="#34d399" stroke-opacity="0.5"/>
  <text x="313" y="468" text-anchor="middle" fill="#86efac" font-size="15" font-weight="600">Multi-model</text>
  <rect x="72" y="490" width="214" height="34" rx="17" fill="#60a5fa" fill-opacity="0.12" stroke="#60a5fa" stroke-opacity="0.5"/>
  <text x="179" y="512" text-anchor="middle" fill="#bfdbfe" font-size="15" font-weight="600">Cross-border compliance</text>
  <rect x="298" y="490" width="176" height="34" rx="17" fill="#fbbf24" fill-opacity="0.12" stroke="#fbbf24" stroke-opacity="0.5"/>
  <text x="386" y="512" text-anchor="middle" fill="#fde68a" font-size="15" font-weight="600">Human-in-the-loop</text>

  <text x="72" y="572" fill="#6e76a6" font-size="14">TypeScript · band.ai · AIML · Bedrock · Vertex · Featherless</text>

  <!-- RIGHT: the decision room -->
  <!-- connectors pods to core -->
  <line x1="784" y1="154" x2="932" y2="250" stroke="#8a93c2" stroke-opacity="0.5" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="965" y1="128" x2="965" y2="238" stroke="#8a93c2" stroke-opacity="0.5" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="1146" y1="154" x2="998" y2="250" stroke="#8a93c2" stroke-opacity="0.5" stroke-width="1.5" marker-end="url(#ar)"/>
  <!-- connectors core to verdicts -->
  <line x1="945" y1="360" x2="852" y2="450" stroke="#8a93c2" stroke-opacity="0.45" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="965" y1="360" x2="958" y2="450" stroke="#8a93c2" stroke-opacity="0.45" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="985" y1="360" x2="1066" y2="450" stroke="#8a93c2" stroke-opacity="0.45" stroke-width="1.5" marker-end="url(#ar)"/>
  <!-- escalate -->
  <path d="M1012,346 L1120,518" fill="none" stroke="#f87171" stroke-opacity="0.7" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#ar)"/>
  <text x="1086" y="430" fill="#f87171" font-size="11" transform="rotate(58,1086,430)">escalate</text>

  <!-- core -->
  <circle cx="965" cy="300" r="118" fill="url(#coreGlow)" filter="url(#soft)"/>
  <rect x="905" y="240" width="120" height="120" rx="24" fill="url(#coreFill)" stroke="#a855f7" stroke-width="1.5"/>
  <text x="965" y="278" text-anchor="middle" font-size="22" fill="#34d399">&#10003;</text>
  <text x="965" y="302" text-anchor="middle" font-size="16" font-weight="700" fill="#f8fafc">BOARD</text>
  <text x="965" y="322" text-anchor="middle" font-size="10.5" fill="#aab3d8">verdict + audit</text>

  <!-- pods -->
  <g>
    <rect x="706" y="94" width="156" height="60" rx="14" fill="#221945" stroke="#a855f7" stroke-opacity="0.65"/>
    <text x="784" y="120" text-anchor="middle" fill="#e9d5ff" font-size="14" font-weight="700">Claims pod</text>
    <circle cx="762" cy="138" r="4" fill="#34d399"/><circle cx="784" cy="138" r="4" fill="#34d399"/><circle cx="806" cy="138" r="4" fill="#34d399"/>
  </g>
  <g>
    <rect x="887" y="66" width="156" height="60" rx="14" fill="#221945" stroke="#a855f7" stroke-opacity="0.65"/>
    <text x="965" y="92" text-anchor="middle" fill="#e9d5ff" font-size="14" font-weight="700">Regulatory pod</text>
    <circle cx="935" cy="110" r="4" fill="#34d399"/><circle cx="957" cy="110" r="4" fill="#34d399"/><circle cx="979" cy="110" r="4" fill="#34d399"/>
    <rect x="993" y="102" width="42" height="16" rx="8" fill="#f87171" fill-opacity="0.18" stroke="#f87171" stroke-opacity="0.6"/>
    <text x="1014" y="114" text-anchor="middle" fill="#fca5a5" font-size="9">rebut</text>
  </g>
  <g>
    <rect x="1068" y="94" width="156" height="60" rx="14" fill="#221945" stroke="#a855f7" stroke-opacity="0.65"/>
    <text x="1146" y="120" text-anchor="middle" fill="#e9d5ff" font-size="14" font-weight="700">Brand pod</text>
    <circle cx="1124" cy="138" r="4" fill="#34d399"/><circle cx="1146" cy="138" r="4" fill="#34d399"/><circle cx="1168" cy="138" r="4" fill="#34d399"/>
  </g>

  <!-- regions -->
  <text x="706" y="250" fill="#6e76a6" font-size="12" letter-spacing="2">REGIONS</text>
  <rect x="706" y="262" width="74" height="26" rx="13" fill="#60a5fa" fill-opacity="0.12" stroke="#60a5fa" stroke-opacity="0.45"/>
  <text x="743" y="279" text-anchor="middle" fill="#bfdbfe" font-size="12" font-weight="600">US</text>
  <rect x="706" y="294" width="74" height="26" rx="13" fill="#60a5fa" fill-opacity="0.12" stroke="#60a5fa" stroke-opacity="0.45"/>
  <text x="743" y="311" text-anchor="middle" fill="#bfdbfe" font-size="12" font-weight="600">EU</text>
  <rect x="706" y="326" width="74" height="26" rx="13" fill="#60a5fa" fill-opacity="0.12" stroke="#60a5fa" stroke-opacity="0.45"/>
  <text x="743" y="343" text-anchor="middle" fill="#bfdbfe" font-size="12" font-weight="600">LATAM</text>

  <!-- verdicts -->
  <rect x="800" y="452" width="104" height="34" rx="17" fill="#34d399" fill-opacity="0.14" stroke="#34d399" stroke-opacity="0.6"/>
  <text x="852" y="474" text-anchor="middle" fill="#86efac" font-size="13" font-weight="700">Published</text>
  <rect x="916" y="452" width="84" height="34" rx="17" fill="#f87171" fill-opacity="0.14" stroke="#f87171" stroke-opacity="0.6"/>
  <text x="958" y="474" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="700">Spiked</text>
  <rect x="1012" y="452" width="120" height="34" rx="17" fill="#60a5fa" fill-opacity="0.14" stroke="#60a5fa" stroke-opacity="0.6"/>
  <text x="1072" y="474" text-anchor="middle" fill="#bfdbfe" font-size="13" font-weight="700">Per-market</text>

  <!-- human -->
  <rect x="1066" y="518" width="164" height="46" rx="12" fill="#2a230f" stroke="#fbbf24" stroke-opacity="0.6"/>
  <text x="1148" y="540" text-anchor="middle" fill="#fde68a" font-size="13" font-weight="700">Compliance Lead</text>
  <text x="1148" y="556" text-anchor="middle" fill="#b8a86a" font-size="10">human rules the deadlock</text>
</svg>
